# Role ARN is stable (module.irsa-dbt always names the role
# yt-pipeline-dbt-irsa), hardcoded here the same way k8s/serviceaccount.yaml
# hardcodes the dashboard's — ArgoCD applies this as-is. The actual per-run
# Job resource that uses this ServiceAccount is created dynamically by the
# yt-dbt-trigger Lambda, not by ArgoCD; only the namespace + ServiceAccount
# are GitOps-managed static pieces.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dbt
  namespace: data-pipeline
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::300617413029:role/yt-pipeline-dbt-irsa"
