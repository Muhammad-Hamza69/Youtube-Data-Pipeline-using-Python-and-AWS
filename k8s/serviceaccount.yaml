# This role ARN is stable (module.irsa always names the role
# yt-pipeline-dashboard-irsa) and essentially never changes, so it's
# hardcoded here rather than templated — ArgoCD applies this file as-is,
# there's no CI patch step anymore.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-sa
  namespace: monitoring
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::300617413029:role/yt-pipeline-dashboard-irsa"
