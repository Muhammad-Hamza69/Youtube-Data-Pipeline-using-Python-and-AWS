# The eks.amazonaws.com/role-arn annotation below is a placeholder — the
# deploy-dashboard job in .github/workflows/deploy.yml overwrites it after
# `terraform apply` with the real ARN via:
#   kubectl annotate serviceaccount dashboard-sa -n monitoring \
#     eks.amazonaws.com/role-arn=$(terraform output -raw dashboard_role_arn) --overwrite
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-sa
  namespace: monitoring
  annotations:
    eks.amazonaws.com/role-arn: "REPLACE_WITH_IRSA_ROLE_ARN"
