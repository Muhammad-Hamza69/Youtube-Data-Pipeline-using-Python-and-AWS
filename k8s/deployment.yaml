# The image tag below is bumped by deploy-dashboard.yml on every dashboard
# release and committed back to this file — ArgoCD watches this path and
# syncs the change. Env var values are static since none of these resource
# names have random suffixes (fixed by the Terraform modules), so no runtime
# templating is needed for them.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: dashboard-sa
      containers:
        - name: dashboard
          image: 300617413029.dkr.ecr.us-east-1.amazonaws.com/yt-dashboard:f96f66597db02a143bf3059fd82d8653f6df3c44
          ports:
            - containerPort: 8080
          env:
            - name: STATE_MACHINE_ARN
              value: "arn:aws:states:us-east-1:300617413029:stateMachine:yt-data-pipeline"
            - name: ATHENA_WORKGROUP
              value: "yt-pipeline-dashboard"
            - name: GOLD_DATABASE
              value: "yt_pipeline_gold_db"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_DEFAULT_REGION
              # boto3.client() calls with no explicit region_name raised
              # NoRegionError in the running pod despite AWS_REGION being set —
              # some botocore versions/resolution paths only check
              # AWS_DEFAULT_REGION. Set both; AWS_DEFAULT_REGION has been
              # recognized by every botocore version.
              value: "us-east-1"
            - name: TRIGGER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-api-key
                  key: key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
