# Applied once, manually, as a bootstrap step (see DEPLOYMENT.md) — not
# managed by Terraform. Terraform's kubernetes_manifest resource validates
# this CRD's schema at plan time, which doesn't exist yet on the same apply
# that installs ArgoCD (module.argocd) — not worth fighting for a resource
# this static (repo/path/branch, rarely touched after creation).
#
# Verified clean before enabling automated sync: kubectl diff -f k8s/ showed
# zero drift, and the first manual sync only added ArgoCD's own tracking
# labels (pods weren't restarted, 0 RESTARTS / unchanged AGE afterward) — the
# two placeholders that used to live in k8s/deployment.yaml and
# k8s/serviceaccount.yaml were fixed with real values first, so a sync can no
# longer revert live state to a placeholder.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Muhammad-Hamza69/Youtube-Data-Pipeline-using-Python-and-AWS.git
    targetRevision: main
    path: k8s
    directory:
      exclude: "argocd/*"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
