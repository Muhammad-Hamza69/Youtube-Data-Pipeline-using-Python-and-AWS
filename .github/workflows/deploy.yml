name: Provision Shared Infrastructure

# Lints the whole repo and applies everything except the 3 Lambdas and the
# dashboard — each of those now has its own independent deploy-*.yml
# workflow (instructor feedback: "three lambdas should be separately
# managed" / "Go with Argo CD"). Kept as one workflow file so `needs:` can
# sequence lint -> changes -> terraform-apply — GitHub Actions job
# dependencies only work within a single workflow.
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black
      - run: flake8 lambdas dashboard --max-line-length=120
      - run: black --check lambdas dashboard
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - run: terraform fmt -check -recursive terraform/

  changes:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - 'iam_permission/**'
              - 'step_functions/**'

  # Applies everything except the 3 Lambdas and the dashboard, each of which
  # now has its own independent deploy-*.yml workflow (see instructor
  # feedback: "three lambdas should be separately managed"). This job still
  # applies the full untargeted root module — it just doesn't own any
  # component's release cycle, so it reads back each Lambda's
  # already-deployed image tag instead of assuming github.sha.
  terraform-apply:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    environment: production   # manual-approval gate: a required reviewer must approve before this job runs
    defaults:
      run:
        working-directory: terraform/envs/prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - run: terraform init

      - name: Read back current per-component image tags
        id: tags
        run: |
          echo "ingest=$(terraform output -raw ingest_image_uri | awk -F: '{print $NF}')" >> "$GITHUB_OUTPUT"
          echo "raw_transform=$(terraform output -raw raw_transform_image_uri | awk -F: '{print $NF}')" >> "$GITHUB_OUTPUT"
          echo "dbt_trigger=$(terraform output -raw dbt_trigger_image_uri | awk -F: '{print $NF}')" >> "$GITHUB_OUTPUT"
          echo "dbt=$(terraform output -raw dbt_image_uri | awk -F: '{print $NF}')" >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var="ingest_image_tag=${{ steps.tags.outputs.ingest }}" \
            -var="raw_transform_image_tag=${{ steps.tags.outputs.raw_transform }}" \
            -var="dbt_trigger_image_tag=${{ steps.tags.outputs.dbt_trigger }}" \
            -var="dbt_image_tag=${{ steps.tags.outputs.dbt }}" \
            -var="youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}" \
            -var="allowed_dashboard_cidr=${{ vars.DASHBOARD_ALLOWED_CIDR }}" \
            -var="alert_email=${{ vars.ALERT_EMAIL }}" \
            -var="quicksight_user_arn=${{ vars.QUICKSIGHT_USER_ARN }}" \
            -var="lakeformation_admin_arns=${{ vars.LAKEFORMATION_ADMIN_ARNS }}"
