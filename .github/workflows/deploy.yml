name: Build, Provision & Deploy

# Combined push-to-main pipeline. Kept as one workflow file (rather than
# separate build/apply/deploy files) so `needs:` can actually sequence the
# jobs — GitHub Actions job dependencies only work within a single workflow.
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 black
      - run: flake8 lambdas data_quality dashboard --max-line-length=120
      - run: black --check lambdas data_quality dashboard
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - run: terraform fmt -check -recursive terraform/

  changes:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      ingest: ${{ steps.filter.outputs.ingest }}
      json_to_parquet: ${{ steps.filter.outputs.json_to_parquet }}
      data_quality: ${{ steps.filter.outputs.data_quality }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ingest:
              - 'lambdas/youtube_api_integstion/**'
            json_to_parquet:
              - 'lambdas/json_to_parquet/**'
            data_quality:
              - 'data_quality/**'
            dashboard:
              - 'dashboard/**'
            terraform:
              - 'terraform/**'
              - 'iam_permission/**'
              - 'step_functions/**'
              - 'glue_jobs/**'

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.ingest == 'true' ||
      needs.changes.outputs.json_to_parquet == 'true' ||
      needs.changes.outputs.data_quality == 'true' ||
      needs.changes.outputs.dashboard == 'true'
    strategy:
      matrix:
        include:
          - name: yt-ingest
            dir: lambdas/youtube_api_integstion
            changed: ${{ needs.changes.outputs.ingest }}
          - name: yt-json-to-parquet
            dir: lambdas/json_to_parquet
            changed: ${{ needs.changes.outputs.json_to_parquet }}
          - name: yt-data-quality
            dir: data_quality
            changed: ${{ needs.changes.outputs.data_quality }}
          - name: yt-dashboard
            dir: dashboard
            changed: ${{ needs.changes.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - uses: aws-actions/configure-aws-credentials@v4
        if: matrix.changed == 'true'
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        if: matrix.changed == 'true'
        id: ecr

      - name: Ensure ECR repository exists
        # First-ever run has nothing to push into: the repo is normally created by
        # terraform-apply, which runs *after* this job. ECR doesn't auto-create repos
        # on push, so bootstrap it here if missing. Idempotent — once terraform-apply
        # runs, module.ecr just manages this same repository going forward.
        if: matrix.changed == 'true'
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.name }}" \
            || aws ecr create-repository --repository-name "${{ matrix.name }}"

      - name: Build and push
        if: matrix.changed == 'true'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t "$REGISTRY/${{ matrix.name }}:${{ github.sha }}" "${{ matrix.dir }}"
          docker push "$REGISTRY/${{ matrix.name }}:${{ github.sha }}"

  terraform-apply:
    runs-on: ubuntu-latest
    needs: [changes, build-and-push-images]
    if: always() && needs.changes.result == 'success'
    environment: production   # manual-approval gate: a required reviewer must approve before this job runs
    defaults:
      run:
        working-directory: terraform/envs/prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - run: terraform init

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ github.sha }}" \
            -var="youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}" \
            -var="allowed_dashboard_cidr=${{ vars.DASHBOARD_ALLOWED_CIDR }}"

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name yt-pipeline-dashboard --region ${{ env.AWS_REGION }}

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Patch IRSA role ARN onto the service account
        working-directory: terraform/envs/prod
        run: |
          terraform init
          ROLE_ARN=$(terraform output -raw dashboard_role_arn)
          kubectl annotate serviceaccount dashboard-sa -n monitoring \
            eks.amazonaws.com/role-arn="$ROLE_ARN" --overwrite

      - name: Roll out new dashboard image
        run: |
          REPO_URI=$(aws ecr describe-repositories --repository-names yt-dashboard --query 'repositories[0].repositoryUri' --output text)
          kubectl set image deployment/dashboard dashboard="$REPO_URI:${{ github.sha }}" -n monitoring
          kubectl rollout status deployment/dashboard -n monitoring --timeout=180s
