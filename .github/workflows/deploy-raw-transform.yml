name: Deploy yt-raw-transform

# Independent release cycle for the raw-transform Lambda (instructor
# feedback: "three lambdas should be separately managed" — extended to this
# Lambda's replacement). Only runs when this Lambda's own source or
# Terraform modules change.
on:
  push:
    branches: [main]
    paths:
      - "lambdas/raw_transform/**"
      - "terraform/modules/lambda-transform/**"
      - "terraform/modules/iam-transform/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names yt-raw-transform \
            || aws ecr create-repository --repository-name yt-raw-transform

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t "$REGISTRY/yt-raw-transform:${{ github.sha }}" lambdas/raw_transform
          docker push "$REGISTRY/yt-raw-transform:${{ github.sha }}"

  terraform-apply:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    defaults:
      run:
        working-directory: terraform/envs/prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - run: terraform init

      - name: Read back sibling component image tags
        id: sibling_tags
        run: |
          echo "ingest=$(terraform output -raw ingest_image_uri | awk -F: '{print $NF}')" >> "$GITHUB_OUTPUT"
          echo "dbt_trigger=$(terraform output -raw dbt_trigger_image_uri | awk -F: '{print $NF}')" >> "$GITHUB_OUTPUT"
          echo "dbt=$(terraform output -raw dbt_image_uri | awk -F: '{print $NF}')" >> "$GITHUB_OUTPUT"

      - name: Terraform apply (yt-raw-transform only)
        run: |
          terraform apply -auto-approve \
            -target=module.lambda_transform -target=module.iam_transform \
            -var="raw_transform_image_tag=${{ github.sha }}" \
            -var="ingest_image_tag=${{ steps.sibling_tags.outputs.ingest }}" \
            -var="dbt_trigger_image_tag=${{ steps.sibling_tags.outputs.dbt_trigger }}" \
            -var="dbt_image_tag=${{ steps.sibling_tags.outputs.dbt }}" \
            -var="youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}" \
            -var="allowed_dashboard_cidr=${{ vars.DASHBOARD_ALLOWED_CIDR }}" \
            -var="alert_email=${{ vars.ALERT_EMAIL }}" \
            -var="quicksight_user_arn=${{ vars.QUICKSIGHT_USER_ARN }}" \
            -var="lakeformation_admin_arns=${{ vars.LAKEFORMATION_ADMIN_ARNS }}"
